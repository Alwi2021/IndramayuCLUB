<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDRAMAYU CLUB - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .neon-text { text-shadow: 0 0 10px rgba(6, 182, 212, 0.8); }
        .gate-btn { transition: all 0.3s ease; border: 1px solid #1e293b; }
        .gate-btn:active { scale: 0.90; background: #06b6d4; color: black; }
    </style>
</head>
<body class="p-8">

    <div class="text-center">
        <div class="mb-6 animate-pulse">
            <span class="text-6xl">💎</span>
        </div>
        
        <h1 class="text-2xl font-bold tracking-[0.3em] neon-text mb-2">INDRAMAYU CLUB</h1>
        <p class="text-[9px] text-cyan-500 tracking-widest uppercase mb-12">Intelligence Assistant: Nur Engine</p>

        <div class="max-w-xs mx-auto space-y-4">
            <button onclick="window.location.href='cd.html'" class="gate-btn w-full py-5 rounded-2xl bg-slate-900/50 font-bold text-xs tracking-widest hover:border-cyan-500">
                ENTER GAME VAULT 🎮
            </button>
            
            <p class="text-[7px] text-slate-600 uppercase mt-10">
                Managed by Admin Jamhari<br>
                © 2026 Secured by Nur
            </p>
        </div>
    </div>

    <script>
        // Nur memberikan respon getar halus saat masuk
        window.addEventListener('load', () => {
            if (navigator.vibrate) navigator.vibrate(50);
        });
    </script>
</body>
</html>
