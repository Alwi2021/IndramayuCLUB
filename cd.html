<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME VAULT - NUR ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #020617; color: white; font-family: sans-serif; }</style>
</head>
<body class="p-4">
    <h2 class="text-cyan-400 text-center tracking-widest mb-6">SELECT GAME DISK</h2>
    <div class="grid grid-cols-1 gap-6">
        <div onclick="play('1JaezXvqW3QOyZJOr-DVo1WWqAkQS4r-J')" class="bg-slate-900 rounded-2xl overflow-hidden border-2 border-yellow-500 active:scale-95 transition-all">
            <img src="https://m.media-amazon.com/images/I/51G8K280TCL.jpg" class="w-full h-48 object-cover">
            <div class="p-4 text-center bg-yellow-500/10">
                <p class="font-bold text-yellow-500">🏎️ RUMBLE RACING</p>
                <p class="text-[10px] opacity-50">CLICK TO BOOT ENGINE</p>
            </div>
        </div>
        </div>
    <script>
        function play(id) {
            if (navigator.vibrate) navigator.vibrate(50);
            window.location.href = 'play-ps1.html?id=' + id;
        }
    </script>
</body>
</html>
