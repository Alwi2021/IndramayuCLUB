<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indramayu Club Game - Secret Link Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }
        .cd-case { transition: all 0.4s ease; border: 1px solid #1e293b; position: relative; overflow: hidden; cursor: pointer; }
        .cd-case:hover { transform: translateY(-10px); border-color: #06b6d4; box-shadow: 0 10px 20px rgba(6, 182, 212, 0.3); }
    </style>
</head>
<body class="p-4 bg-slate-950">

    <div class="mb-6 bg-black border-2 border-cyan-900 rounded-3xl p-5 text-center shadow-[inset_0_0_20px_rgba(6,182,212,0.2)]">
        <h2 id="display-title" class="text-xs text-cyan-400 tracking-[0.3em] uppercase">Nur Engine V.2 Active</h2>
        <p id="display-stat" class="text-[7px] text-slate-500 mt-1 uppercase">Sistem Link Rahasia Terkoneksi</p>
    </div>

    <div class="space-y-8 mb-28">
        <section>
            <h3 class="text-[9px] text-yellow-500 mb-4 flex items-center gap-2 uppercase">Arena Arisan (4P)</h3>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="bootSecret('DOKAPON', 'DOKAPON_ID')" class="cd-case rounded-2xl bg-slate-900/50">
                    <img src="https://vimm.net/vault/images/covers/ps1/Dokapon%21%20-%20Ikari%20no%20Tekken.jpg" class="h-44 w-full object-cover rounded-t-2xl">
                    <div class="p-2 text-center text-[8px] font-bold">DOKAPON!</div>
                </div>
                <div onclick="bootSecret('CTR', 'CTR_ID')" class="cd-case rounded-2xl bg-slate-900/50">
                    <img src="https://vimm.net/vault/images/covers/ps1/Crash%20Team%20Racing.jpg" class="h-44 w-full object-cover rounded-t-2xl">
                    <div class="p-2 text-center text-[8px] font-bold">CTR RACING</div>
                </div>
            </div>
        </section>

        <section>
            <h3 class="text-[9px] text-cyan-500 mb-4 flex items-center gap-2 uppercase">Master Game (Play Direct)</h3>
            <div class="grid grid-cols-1 gap-4">
                <div onclick="mainkanGame('1JaezXvqW3QOyZJOr-DVo1WWqAkQS4r-J')" class="cd-case rounded-2xl bg-slate-900/50 border-2 border-yellow-500">
                    <img src="https://m.media-amazon.com/images/I/51G8K280TCL.jpg" class="h-56 w-full object-cover rounded-t-2xl">
                    <div class="p-4 bg-yellow-600/20 text-center">
                        <p class="text-[10px] font-bold text-yellow-400 uppercase">🏎️ KLIK UNTUK MAIN RUMBLE RACING</p>
                        <span class="text-[7px] text-white">NUR ENGINE STREAMING ACTIVE</span>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div class="fixed bottom-0 left-0 w-full p-5 bg-slate-950/90 backdrop-blur-xl border-t border-slate-800">
        <input type="text" id="v-input" placeholder="VOUCHER: INDRAMAYUCLUB" class="w-full bg-black border border-slate-700 p-4 rounded-2xl text-center text-yellow-500 font-bold mb-3">
        <button onclick="proses()" class="w-full py-4 bg-cyan-600 rounded-2xl font-bold text-[9px] uppercase tracking-[0.2em]">Koneksi ke Nur Server</button>
    </div>

    <script>
        // Fungsi Mainkan Game Tanpa Ribet
        function mainkanGame(id) {
            if (navigator.vibrate) navigator.vibrate(100);
            document.getElementById('display-title').innerText = "BOOTING: RUMBLE RACING";
            // Nur mengarahkan ke file play-ps1.html dengan parameter ID
            setTimeout(() => {
                window.location.href = "play-ps1.html?id=" + id;
            }, 1000);
        }

        function bootSecret(name, id) {
            alert("Game " + name + " terpilih. Masukkan Voucher!");
        }

        function proses() {
            const code = document.getElementById('v-input').value.toUpperCase();
            if(code === "INDRAMAYUCLUB") {
                alert("VOUCHER OK! Hubungi WA Admin untuk Link.");
                window.location.href = "https://wa.me/6281386517352?text=Pak%20Admin%2C%20saya%20sudah%20punya%20Voucher%20IndramayuClub.";
            } else {
                alert("VOUCHER SALAH!");
            }
        }
    </script>
</body>
</html>
