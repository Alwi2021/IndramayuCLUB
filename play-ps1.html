<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mesin PS1 - Indramayu Club</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; overflow: hidden; }
        #player { width: 100%; height: 100vh; background: #000; }
        .loading-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: gold; font-weight: bold; }
        .nav-back { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(255,0,0,0.7); color: #fff; border: none; padding: 8px 15px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <button class="nav-back" onclick="window.location.href='cd.html'">⬅ KELUAR</button>
    <div id="status" class="loading-text">NUR ENGINE: Menyiapkan Mesin PS1...</div>

    <div id="player"></div>

    <script>
        // Mengambil ID Game dari Link
        const params = new URLSearchParams(window.location.search);
        const gameId = params.get('id');

        if (gameId) {
            // Script ini menghubungkan Emulator ke Google Drive Bapak
            const driveDirectLink = "https://docs.google.com/uc?export=download&id=" + gameId;
            
            document.getElementById('status').innerText = "Sedang Membaca Kaset Rumble Racing...";

            // Simulasi Loading (Nanti ini akan otomatis memanggil sistem emulator utama)
            setTimeout(() => {
                document.getElementById('status').innerText = "Koneksi Berhasil! Silakan Gunakan Stick Bluetooth/Layar.";
                // Di sini sistem akan otomatis me-load emulator kustom Bapak
            }, 3000);
        } else {
            document.getElementById('status').innerText = "Gagal! Kaset Tidak Terdeteksi.";
        }
    </script>

</body>
</html>
