<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mesin PS1 - Indramayu Club</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; overflow: hidden; }
        #emulator-box { width: 100%; height: 100vh; background: #000; display: flex; flex-direction: column; }
        iframe { flex-grow: 1; border: none; width: 100%; height: 100%; }
        .nav-back { position: absolute; top: 10px; left: 10px; z-index: 100; background: red; color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .loading-screen { position: absolute; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 50; }
    </style>
</head>
<body>

    <button class="nav-back" onclick="window.location.href='cd.html'">⬅ KELUAR</button>

    <div id="loader" class="loading-screen">
        <div style="color: gold; font-weight: bold;">
            <p>NUR ENGINE V.2</p>
            <p id="msg">Menyiapkan Mesin PS1...</p>
        </div>
    </div>

    <div id="emulator-box">
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const gameId = params.get('id');

        if (gameId) {
            // Jalur rahasia ke Google Drive Bapak
            const gameUrl = "https://docs.google.com/uc?export=download&id=" + gameId;
            
            // Nur memanggil Mesin Emulator Online yang mendukung PS1 (PCSX)
            // Menggunakan webretro untuk streaming file bin/iso
            const emuPath = "https://www.webretro.cc/?rom=" + encodeURIComponent(gameUrl) + "&core=pcsx_rearmed";

            document.getElementById('msg').innerText = "Kaset Rumble Racing Terdeteksi...";
            
            // Masukkan link game ke dalam mesin
            document.getElementById('game-frame').src = emuPath;

            // Hilangkan loading screen setelah 5 detik
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 5000);

        } else {
            document.getElementById('msg').innerText = "Gagal! Kaset Tidak Ada.";
            document.getElementById('msg').style.color = "red";
        }
    </script>

</body>
</html>
